# Nginx configuration for EcomCreatives on Hostinger VPS
# Place this file at: /etc/nginx/sites-available/ecomcreatives
# Then run:
#   sudo ln -s /etc/nginx/sites-available/ecomcreatives /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN.com with your actual domain name.
# For SSL, run: sudo certbot --nginx -d YOUR_DOMAIN.com

# Redirect HTTP → HTTPS (uncomment after SSL is set up)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;     # uncomment after SSL setup
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # --- SSL (managed by Certbot — uncomment after running certbot) ---
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Increase body size limit for image uploads ---
    # The app compresses images client-side but allow up to 20MB to be safe
    client_max_body_size 20M;

    # --- Increase timeouts for AI image generation (can take 60-90 seconds) ---
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;

    # --- Next.js static assets with aggressive caching ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Next.js image optimization endpoint ---
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- All other requests → Next.js app ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (for Next.js HMR in dev; safe to keep in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Logging ---
    access_log /var/log/nginx/ecomcreatives-access.log;
    error_log  /var/log/nginx/ecomcreatives-error.log;
}
